<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troco</title>
</head>
<body>

    <script>
        let valorProduto = prompt('Qual o valor do produto?');
        let quantidadeProduto = prompt('Quantos produtos foram comprados?');
        let valorPago = prompt('Qual o valor pago?');
        let troco =  (valorPago - valorProduto * quantidadeProduto);

        alert(`o troco da compra é de ${troco} reais. Tenha um bom dia!`);
         </script>
</body>
</html>
