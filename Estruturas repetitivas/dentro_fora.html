<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body> 
    <script>
       let quantidade = parseInt(prompt('Digite a quantidade de números que deseja informar:'));
       let numerosDentro = 0;
       let numerosFora = 0;
       

         for (let i = 0; i < quantidade; i++) {
                let numero = parseFloat(prompt(`Digite o ${i + 1}º número:`));
                if (numero >= 10 && numero <= 20) {
                    numerosDentro ++;
                } else {
                    numerosFora ++;
                }
            }

            alert(`Quantidade de números dentro do intervalo [10, 20]: ${numerosDentro}\nQuantidade de números fora do intervalo: ${numerosFora}`);

                
                
    </script>
</body>
</html>
