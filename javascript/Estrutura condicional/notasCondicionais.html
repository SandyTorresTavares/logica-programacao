<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas Condicionais</title>

</head>
<body>
    <script>
        let nota1 = prompt('Qual a nota da primeira prova?');
        let nota2 = prompt('Qual a nota da segunda prova?');
        let media = (parseFloat(nota1) + parseFloat(nota2)) / 2;

        if (media >= 5) {
            alert(`Parabéns! Você foi aprovado com média ${media}.`);
        } else if (media < 5 && media >= 4) {
            alert(`Você está de recuperação com média ${media}.`);
        } else {
            alert(`Você foi reprovado com média ${media}.`);
        }
            </script>


</body>
</html>
