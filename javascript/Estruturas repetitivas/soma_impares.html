<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma de números impares</title>
</head>
<body>
    <script> 
        let numero1 = parseInt(prompt('Digite o primeiro número:'));
        let numero2 = parseInt(prompt('Digite o segundo número:'));
        let soma = 0;

        for (let i = numero1; i < numero2; i++) {
            if (i % 2 !== 0) {
                soma += i;
            }
        }

        alert(`A soma dos números ímpares entre ${numero1} e ${numero2} é: ${soma}`);
    </script>
</body>
</html>
