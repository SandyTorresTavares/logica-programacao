<!DOCTYPE html>
<html lang="pt-br"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numero = parseInt(prompt('Digite um número inteiro:'));
        let resultado = '';

        for (let i = 0; i <= numero; i++) {
            if (i % 2 !== 0) {
                resultado += `${i}\n`;
                
            }
        }
        alert(`Os números ímpares de 0 até ${numero} são:\n${resultado}`);
    </script>
</body>
</html>
