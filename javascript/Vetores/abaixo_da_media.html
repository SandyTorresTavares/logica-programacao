<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Números Pares</title>
</head>
<body>
    <script>
        let quantidadeVetores = parseInt(prompt('Quantos números terá nosso vetor?'))
        let vetores = []
        let soma = 0
        let abaixoDaMedia = []


        for (let i = 0; i < quantidadeVetores; i++) {
            let numero = parseFloat(prompt(`digite o ${i+1}º numero`))

            vetores.push(numero)

            soma += numero 

            }
        let media = soma / quantidadeVetores

        for (let i = 0; i < quantidadeVetores; i++) {

        if (vetores[i] < media) {
        abaixoDaMedia.push(vetores[i]);
    }
}

     alert(`A media dos vetores é ${media}.\n Numeros abaixo da média: \n ${abaixoDaMedia.join('\n')}`)

    </script>
</body>
</html>
