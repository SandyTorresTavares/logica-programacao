<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>    
        let quantidade = parseInt(prompt('Quantos números você deseja informar?'))
        let numeros = [];
        let negativos = [];

        for (let i = 0; i < quantidade; i++) {
            let numero = parseFloat(prompt(`Informe o ${i + 1}º número:`));
            numeros.push(numero);
         
            if (numero < 0) {
                negativos.push(numero);
            }
        }   
        
        alert(`Os números informados foram: ${numeros.join(', ')}\nOs números negativos são: ${negativos.join(', ')}`);
    </script>
</body>
</html>
